<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>PH116 Exit Quiz</title>
<style>
body{font-family:system-ui,sans-serif;line-height:1.45;margin:0;padding:24px;background:radial-gradient(circle at top,#1b2745,#090a0f);color:#f2f2f2}
#quiz2{max-width:760px;margin:auto;background:#121212;border:1px solid #2c2c2c;border-radius:18px;padding:24px}
.progress-wrap{width:100%;height:10px;background:#222;border-radius:20px;overflow:hidden}
#progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#00d4ff,#00ff99)}
.q2_option{display:block;width:100%;margin:8px 0;padding:12px;background:#181818;color:#fff;border:1px solid #333;border-radius:10px;text-align:left;cursor:pointer}
.correct{color:#00ff88} .incorrect{color:#ff6666}
</style></head><body>
<div id="quiz2"><h1>PH116 Exit Quiz</h1><div>Reflection, Refraction & Polarization</div>
<div class="progress-wrap"><div id="progress-bar"></div></div>
<h3 id="p"></h3><div id="s"></div><div id="o"></div><div id="f"></div><button id="r">Restart</button></div>
<script>
const quiz2=[{stem:'When a light ray travels from air into glass, which quantity remains unchanged across the boundary?',choices:['Wavelength', 'Frequency', 'Speed', 'Refractive index'],correctIndex:1},{stem:"Snell's law follows directly from the requirement that",choices:['energy is conserved.', 'the wave amplitude remains constant.', 'the phase of the wave is continuous along the boundary.', 'the wavelength remains unchanged.'],correctIndex:2},{stem:'The angle of incidence is always measured',choices:['relative to the surface.', 'relative to the reflected ray.', 'relative to the normal to the surface.', 'relative to the refracted ray.'],correctIndex:2},{stem:'When light travels from a lower refractive index into a higher refractive index, the refracted ray bends',choices:['away from the normal.', 'toward the normal.', 'parallel to the surface.', 'by exactly 90 degrees.'],correctIndex:1},{stem:'Total internal reflection can occur only when light travels',choices:['from a low-index medium into a high-index medium.', 'from a high-index medium into a lower-index medium.', 'between identical media.', 'through a vacuum.'],correctIndex:1},{stem:'At the critical angle,',choices:['the reflected ray disappears.', 'the refracted ray travels along the boundary.', 'the incident ray becomes perpendicular to the surface.', 'the reflected intensity becomes zero.'],correctIndex:1},{stem:'For a p-polarized wave, the Brewster angle is reached when',choices:['reflection is maximum.', 'transmission is zero.', 'the reflected wave disappears.', 'refraction stops completely.'],correctIndex:2},{stem:'Which statement about s-polarized light is correct?',choices:['It also exhibits zero reflection at the Brewster angle.', 'Its reflection coefficient never becomes exactly zero.', 'It cannot be reflected.', 'It always undergoes total internal reflection.'],correctIndex:1},{stem:'The refractive index of a material generally',choices:['is independent of wavelength.', 'decreases exactly linearly with wavelength.', 'depends on the wavelength of light.', 'depends only on light intensity.'],correctIndex:2},{stem:'The separation of white light into colors by a prism is called',choices:['interference.', 'diffraction.', 'polarization.', 'dispersion.'],correctIndex:3},{stem:'The imaginary part of a complex refractive index primarily describes',choices:['the bending of light.', 'attenuation of the wave inside the material.', 'the wavelength in vacuum.', 'the frequency of the wave.'],correctIndex:1},{stem:'If the imaginary part of the refractive index increases, the transmitted beam becomes',choices:['brighter.', 'unchanged.', 'more strongly attenuated.', 'more highly polarized.'],correctIndex:2},{stem:'A linearly polarized laser can behave as either p-polarized or s-polarized depending on',choices:['its wavelength.', 'its power.', 'the orientation of the plane of incidence.', 'the refractive index alone.'],correctIndex:2},{stem:'The electric field of a p-polarized wave lies',choices:['perpendicular to the plane of incidence.', 'in the plane of incidence.', 'parallel to the reflected ray.', 'parallel to the magnetic field.'],correctIndex:1},{stem:'The electric and magnetic fields in an electromagnetic wave are always',choices:['parallel to one another.', 'perpendicular to one another.', 'opposite in direction.', 'unrelated.'],correctIndex:1},{stem:'The direction of the magnetic field is determined by',choices:["Snell's law.", "Coulomb's law.", 'the cross product of the propagation direction and the electric field.', "Newton's second law."],correctIndex:2},{stem:'The Fresnel reflection coefficient relates the',choices:['reflected wavelength to the incident wavelength.', 'reflected electric-field amplitude to the incident electric-field amplitude.', 'reflected frequency to the transmitted frequency.', 'reflected power to the refractive index.'],correctIndex:1},{stem:'The reflected intensity is proportional to',choices:['the Fresnel coefficient.', 'the square of the Fresnel reflection coefficient.', 'the refractive index.', 'the wavelength.'],correctIndex:1},{stem:'For a lossless interface, the reflected and transmitted energy coefficients satisfy',choices:['R - T = 1', 'R × T = 1', 'R + T = 1', 'R = T'],correctIndex:2},{stem:'When total internal reflection occurs, the transmitted field inside the second medium is',choices:['completely absent.', 'an evanescent wave that decays exponentially away from the boundary.', 'stronger than the incident wave.', 'polarized perpendicular to the surface.'],correctIndex:1}];
let idx=0,score=0;
const p=document.getElementById('p'),s=document.getElementById('s'),o=document.getElementById('o'),f=document.getElementById('f');
function render(){
document.getElementById('progress-bar').style.width=(idx/quiz2.length*100)+'%';
p.textContent=`Question ${idx+1} of ${quiz2.length} · Score: ${score}/${quiz2.length}`;
s.textContent=quiz2[idx].stem;o.innerHTML='';f.textContent='';
'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach((L,i)=>{if(i<quiz2[idx].choices.length){let b=document.createElement('button');b.className='q2_option';b.innerHTML='<b>'+L+')</b> '+quiz2[idx].choices[i];b.onclick=()=>ans(i);o.appendChild(b);}});
}
function ans(i){if(i===quiz2[idx].correctIndex){score++;f.className='correct';f.textContent='Correct!';setTimeout(()=>{idx++;if(idx<quiz2.length)render();else{p.textContent=`Completed · Final Score: ${score}/${quiz2.length}`;s.textContent='Quiz finished.';o.innerHTML='';f.textContent='Press Restart to try again.';}},500);}
else{f.className='incorrect';f.textContent='Incorrect — restarting from Question 1…';setTimeout(()=>{idx=0;score=0;render();},700);}}
document.getElementById('r').onclick=()=>{idx=0;score=0;render();};
render();
</script></body></html>
