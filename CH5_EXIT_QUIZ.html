<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>PH116 Exit Quiz</title>
<style>
body{font-family:system-ui,sans-serif;line-height:1.45;margin:0;padding:24px;background:radial-gradient(circle at top,#1b2745,#090a0f);color:#f2f2f2}
#quiz2{max-width:760px;margin:auto;background:#121212;border:1px solid #2c2c2c;border-radius:18px;padding:24px}
.progress-wrap{width:100%;height:10px;background:#222;border-radius:20px;overflow:hidden}
#progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#00d4ff,#00ff99)}
.q2_option{display:block;width:100%;margin:8px 0;padding:12px;background:#181818;color:#fff;border:1px solid #333;border-radius:10px;text-align:left;cursor:pointer}
.correct{color:#00ff88} .incorrect{color:#ff6666}
</style></head><body>
<div id="quiz2"><h1>PH116 Exit Quiz</h1><div>Reflection, Refraction & Polarization</div>
<div class="progress-wrap"><div id="progress-bar"></div></div>
<h3 id="p"></h3><div id="s"></div><div id="o"></div><div id="f"></div><button id="r">Restart</button></div>
<script>
const quiz2=[{stem:'As a beam of light passes from air into glass, which property stays the same on either side of the boundary?',choices:['The wavelength of the light','The frequency of the light','The speed of the light','The refractive index of the material'],correctIndex:1},{stem:"Snell's law can be derived directly from the condition that",choices:['energy must be conserved at the boundary.', "the wave's amplitude must remain constant.", "the wave's phase must vary continuously across the interface.", 'the wavelength cannot change.'],correctIndex:2},{stem:'By convention, the angle of incidence is measured',choices:['from the surface of the boundary.', 'from the reflected ray.', 'from the normal to the surface.', 'from the refracted ray.'],correctIndex:2},{stem:'When light passes from a medium with a lower refractive index into one with a higher refractive index, the refracted ray bends',choices:['away from the normal line.', 'toward the normal line.', 'so that it runs parallel to the surface.', 'through exactly 90 degrees.'],correctIndex:1},{stem:'Total internal reflection is only possible when light travels',choices:['from a lower-index medium into a higher-index medium.', 'from a higher-index medium into a lower-index medium.', 'between two identical media.', 'through empty vacuum.'],correctIndex:1},{stem:'Exactly at the critical angle,',choices:['the reflected ray vanishes entirely.', 'the refracted ray grazes along the boundary surface.', 'the incident ray strikes the surface perpendicularly.', 'the reflected intensity drops to zero.'],correctIndex:1},{stem:'For p-polarized light, the Brewster angle occurs when',choices:['the reflection is at its strongest.', 'the transmitted intensity drops to zero.', 'the reflected wave vanishes completely.', 'refraction no longer takes place.'],correctIndex:2},{stem:'Which of the following is true of s-polarized light?',choices:['It too has zero reflection at the Brewster angle.', 'Its reflection coefficient never actually reaches zero.', 'It cannot undergo reflection at all.', 'It always experiences total internal reflection.'],correctIndex:1},{stem:'In general, the refractive index of a material',choices:['does not depend on the wavelength of light.', 'falls off exactly linearly as wavelength increases.', 'varies with the wavelength of the light.', 'depends only on the intensity of the light.'],correctIndex:2},{stem:'The splitting of white light into its component colors by a prism is known as',choices:['interference.', 'diffraction.', 'polarization.', 'dispersion.'],correctIndex:3},{stem:'The imaginary component of a complex refractive index mainly characterizes',choices:['how much the light bends.', 'the attenuation of the wave as it travels through the material.', 'the wavelength in vacuum.', "the wave's frequency."],correctIndex:1},{stem:'As the imaginary part of the refractive index grows larger, the transmitted beam becomes',choices:['more intense.', 'unaffected.', 'increasingly attenuated.', 'more strongly polarized.'],correctIndex:2},{stem:'Whether a linearly polarized laser beam acts as p-polarized or s-polarized depends on',choices:["the laser's wavelength.", "the laser's power.", 'how the plane of incidence is oriented relative to the polarization.', 'the refractive index by itself.'],correctIndex:2},{stem:'The electric field vector of a p-polarized wave is oriented',choices:['perpendicular to the plane of incidence.', 'within the plane of incidence.', 'parallel to the reflected ray.', 'parallel to the magnetic field vector.'],correctIndex:1},{stem:'In an electromagnetic wave, the electric and magnetic field vectors are always',choices:['aligned parallel to each other.', 'oriented perpendicular to each other.', 'pointing in opposite directions.', 'unrelated to one another.'],correctIndex:1},{stem:'The orientation of the magnetic field vector is fixed by',choices:["Snell's law.", "Coulomb's law.", 'the cross product of the direction of propagation and the electric field vector.', "Newton's second law."],correctIndex:2},{stem:'The Fresnel reflection coefficient expresses the ratio of the',choices:['reflected wavelength to the incident wavelength.', 'reflected electric-field amplitude to the incident electric-field amplitude.', 'reflected frequency to the transmitted frequency.', 'reflected power to the refractive index.'],correctIndex:1},{stem:'The intensity of the reflected light is proportional to',choices:['the Fresnel coefficient itself.', 'the square of the Fresnel reflection coefficient.', 'the refractive index.', 'the wavelength.'],correctIndex:1},{stem:'At an interface with no energy loss, the reflected and transmitted energy coefficients obey',choices:['R - T = 1', 'R × T = 1', 'R + T = 1', 'R = T'],correctIndex:2},{stem:'During total internal reflection, the field that exists inside the second medium is',choices:['completely zero.', 'an evanescent wave whose amplitude decays exponentially with distance from the boundary.', 'larger in amplitude than the incident wave.', 'polarized perpendicular to the interface.'],correctIndex:1}];
let idx=0,score=0;
const p=document.getElementById('p'),s=document.getElementById('s'),o=document.getElementById('o'),f=document.getElementById('f');
function render(){
document.getElementById('progress-bar').style.width=(idx/quiz2.length*100)+'%';
p.textContent=`Question ${idx+1} of ${quiz2.length} · Score: ${score}/${quiz2.length}`;
s.textContent=quiz2[idx].stem;o.innerHTML='';f.textContent='';
'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach((L,i)=>{if(i<quiz2[idx].choices.length){let b=document.createElement('button');b.className='q2_option';b.innerHTML='<b>'+L+')</b> '+quiz2[idx].choices[i];b.onclick=()=>ans(i);o.appendChild(b);}});
}
function ans(i){if(i===quiz2[idx].correctIndex){score++;f.className='correct';f.textContent='Correct!';setTimeout(()=>{idx++;if(idx<quiz2.length)render();else{p.textContent=`Completed · Final Score: ${score}/${quiz2.length}`;s.textContent='Quiz finished.';o.innerHTML='';f.textContent='Press Restart to try again.';}},500);}
else{f.className='incorrect';f.textContent='Incorrect — restarting from Question 1…';setTimeout(()=>{idx=0;score=0;render();},700);}}
document.getElementById('r').onclick=()=>{idx=0;score=0;render();};
render();
</script></body></html>
